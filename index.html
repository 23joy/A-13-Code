<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisy UI $ tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 

    <!-- google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">


    <title>Document</title>
</head>
<body class="bg-gray-50">
    <header class="w-[80%] mx-auto space-y-5">
        <h1 class="font-bold text-[32px] text-[#002C5C]">Job Application Tracker</h1>
        <div class="grid grid-cols-3  gap-4">
            <div class="bg-white p-5 rounded-xl">
                <p>Total</p>
                <p id="TotalCount" class="text-[#002C5C]">0</p>
            </div>
            <div class="bg-white p-5 rounded-xl" >
                <p>Interview</p>
                <p id="InterviewCount" class="text-green-700">0</p>
            </div>
            <div class="bg-white p-5 rounded-xl">
                <p>Rejected</p>
                <p id="RejectedCount" class="text-red-700">0</p>
            </div>
        </div>
    </header>
    <hr class="my-7.5 ">
    <section class="w-[80%] mx-auto space-y-5 bg-white p-5">
        <h1 class="text-[#002C5C] font-semibold text-[20px]">Available Jobs</h1>
        <div class="gap-2">
            <button id="All-btn" class=" btn btn-primary px-8 py-2.5 rounded-xs">All</button>
            <button id="Interview-btn" class="bg-white px-8 py-2.5 rounded-xs text-[#64748B]">Interview</button>
            <button id="Rejected-btn" class="bg-white px-8 py-2.5 rounded-xs text-[#64748B]">Rejected</button>
        </div>
        <div>
            <div>
                <h1 class="text-[#002C5C] font-semibold text-[18px]">Mobile First Crop</h1>
                <p class="text-[#64748B] font-[16px] ">React Native Developer</p>
            </div>
            <div></div>
            <div>
                <button class="bg-[#EEF4FF] px-3 py-2 text-[#002C5C] rounded-xl">NOT APPLIED</button>
                <h2 class="text-[#323B49]">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</h2>
            </div>
            <button class=" border border-green-600 px-3 py-2 rounded-xl text-green-700">INTERVIEW</button>
            <button class=" border border-red-600 px-3 py-2 rounded-xl text-red-700">REJECTED</button>
        </div>
    </section>
</body>
</html>
